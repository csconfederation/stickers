name: Cleanup GitHub Pages artifacts

on:
  workflow_run:
    workflows:
      - Deploy GitHub Pages
    types:
      - completed
  schedule:
    - cron: "27 3 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: cleanup-pages-artifacts
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete old Pages artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Keep only the newest Pages artifact
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const artifactName = "github-pages";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner,
                repo,
                name: artifactName,
                per_page: 100,
              },
            );

            artifacts.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at),
            );

            const artifactsToDelete = artifacts.slice(1);

            core.info(
              `Found ${artifacts.length} ${artifactName} artifact(s); deleting ${artifactsToDelete.length} old artifact(s).`,
            );

            for (const artifact of artifactsToDelete) {
              core.info(
                `Deleting ${artifact.name} artifact ${artifact.id} created at ${artifact.created_at}.`,
              );
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
